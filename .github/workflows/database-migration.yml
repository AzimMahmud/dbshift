name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'Database/Migrations/**'
      - 'Database/Scripts/**'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'Database/Migrations/**'
      - 'Database/Scripts/**'
      - 'src/**'
      - 'tests/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build DbShift.sln -c Release

      - name: Test
        run: dotnet test DbShift.sln -c Release --no-build

      - name: Validate migrations
        run: dotnet run --project src/DbShift.CLI -- validate --environment local

  deploy-dev:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Deploy to Development
        run: dotnet run --project src/DbShift.CLI -- migrate --environment development --yes

  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Deploy to QA
        run: dotnet run --project src/DbShift.CLI -- migrate --environment qa --yes

  deploy-production:
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Deploy to Production
        run: dotnet run --project src/DbShift.CLI -- migrate --environment production --approver ${{ github.actor }} --yes
