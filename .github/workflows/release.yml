name: release

on:
  push:
    tags:
      - 'v*'
  # Manual fallback in case a tag push doesn't trigger automatically.
  # The tag must already exist; the release is built from it.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing version tag to publish (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  PUBLISH_FRAMEWORK: net8.0
  # The tag being released: explicit input for manual runs, otherwise the pushed tag.
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    # Ignore stray branch pushes — this workflow only publishes version tags.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - rid: win-x64
            asset: windows-x64
            ext: .exe
            compress: zip
          - rid: linux-x64
            asset: linux-x64
            ext: ''
            compress: tar.gz
          - rid: linux-arm64
            asset: linux-arm64
            ext: ''
            compress: tar.gz
          - rid: osx-x64
            asset: macos-x64
            ext: ''
            compress: tar.gz
          - rid: osx-arm64
            asset: macos-arm64
            ext: ''
            compress: tar.gz
      fail-fast: false

    runs-on: ${{ contains(matrix.rid, 'win') && 'windows-latest' || contains(matrix.rid, 'osx') && 'macos-latest' || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x
          global-json-file: global.json

      - name: Publish (${{ matrix.rid }})
        run: dotnet publish src/DbShift.CLI \
          --configuration Release \
          --framework ${{ env.PUBLISH_FRAMEWORK }} \
          --runtime ${{ matrix.rid }} \
          --self-contained true \
          --output ./publish/${{ matrix.rid }} \
          -p:PublishSingleFile=true \
          -p:DebugType=none

      - name: Rename binary
        shell: bash
        run: |
          mv ./publish/${{ matrix.rid }}/dbshift${{ matrix.ext }} ./dbshift${{ matrix.ext }}

      - name: Compress (zip)
        if: matrix.compress == 'zip'
        run: Compress-Archive -Path ./dbshift.exe -DestinationPath ./dbshift-${{ matrix.asset }}.zip

      - name: Compress (tar.gz)
        if: matrix.compress == 'tar.gz'
        run: tar -czf ./dbshift-${{ matrix.asset }}.tar.gz ./dbshift${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dbshift-${{ matrix.asset }}
          path: ./dbshift-${{ matrix.asset }}.*
          if-no-files-found: error

  publish-nuget:
    needs: build
    # Job-level if cannot reference the secrets context, so we only gate on the
    # trigger here and check NUGET_API_KEY per step (see "Check NuGet API key").
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x
            10.0.x
          global-json-file: global.json

      - name: Check NuGet API key
        id: nuget
        env:
          KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NUGET_API_KEY secret is not set; skipping NuGet publish."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        if: steps.nuget.outputs.enabled == 'true'
        run: dotnet pack src/DbShift.CLI \
          --configuration Release \
          --output ./nupkg \
          -p:IncludeSymbols=true \
          -p:SymbolPackageFormat=snupkg \
          -p:ContinuousIntegrationBuild=true

      - name: Push to NuGet
        if: steps.nuget.outputs.enabled == 'true'
        run: dotnet nuget push ./nupkg/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate

      - name: Upload NuGet package
        if: steps.nuget.outputs.enabled == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: ./nupkg/*.nupkg

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./release-artifacts

      - name: Generate release notes
        id: notes
        run: |
          TAG="${RELEASE_TAG}"
          cat <<EOF > ./release-notes.md
          # DbShift $TAG

          ## Installation

          \`\`\`bash
          # Linux / macOS
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/$TAG/install.sh | bash

          # Windows
          powershell -c "iwr -Uri https://github.com/${{ github.repository }}/releases/download/$TAG/install.ps1 | iex"
          \`\`\`

          > **.NET global tool** (\`dotnet tool install --global DbShift\`) will be available once the package is published to NuGet.

          ## Downloads

          | Platform | Package |
          |----------|--------|
          | Windows x64 | \`dbshift-windows-x64.zip\` |
          | Linux x64 | \`dbshift-linux-x64.tar.gz\` |
          | Linux arm64 | \`dbshift-linux-arm64.tar.gz\` |
          | macOS x64 | \`dbshift-macos-x64.tar.gz\` |
          | macOS arm64 | \`dbshift-macos-arm64.tar.gz\` |

          ---

          ## Changelog

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/$TAG/CHANGELOG.md) for details.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: DbShift ${{ env.RELEASE_TAG }}
          body_path: ./release-notes.md
          draft: false
          prerelease: false
          files: |
            ./install.sh
            ./install.ps1
            ./release-artifacts/dbshift-*.zip
            ./release-artifacts/dbshift-*.tar.gz
